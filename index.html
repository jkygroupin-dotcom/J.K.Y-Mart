<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKY Mart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0F172A;
  --card: #1E293B;
  --accent: #6366F1;
  --green: #22C55E;
  --text: #E2E8F0;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: #020617;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: var(--accent);
}

.search {
  width: 40%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.actions span {
  margin-left: 20px;
  cursor: pointer;
}

/* HERO */
.hero {
  padding: 40px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(135deg, #6366F1, #22C55E);
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: var(--green);
  font-weight: bold;
}

button {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 300px;
  height: 100%;
  background: #020617;
  padding: 20px;
  display: none;
}

.cart h3 {
  margin-top: 0;
}

/* DARK MODE TOGGLE */
.toggle {
  cursor: pointer;
}

/* LIGHT MODE */
.light {
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --text: #0F172A;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">JKY Mart</div>
  <input class="search" placeholder="Search products...">
  <div class="actions">
    <span onclick="toggleCart()">Cart 🛒</span>
    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </div>
</div>

<div class="hero">Mega Sale is Live 🚀</div>

<div class="products" id="products"></div>

<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
</div>

<script>
const data = [
  {name:"Headphones", price:1999, img:"https://via.placeholder.com/200"},
  {name:"Shoes", price:2999, img:"https://via.placeholder.com/200"},
  {name:"Watch", price:1499, img:"https://via.placeholder.com/200"},
  {name:"Phone", price:9999, img:"https://via.placeholder.com/200"}
];

let cart = [];

function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";
  data.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p class="price">₹${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(i){
  cart.push(data[i]);
  renderCart();
}

function renderCart(){
  const box = document.getElementById("cartItems");
  box.innerHTML = "";
  cart.forEach(item=>{
    box.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
  });
}

function toggleCart(){
  const cartBox = document.getElementById("cart");
  cartBox.style.display = cartBox.style.display === "block" ? "none" : "block";
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* BASIC AI RECOMMENDATION */
setTimeout(()=>{
  alert("🔥 Recommended for you: Headphones");
},3000);

renderProducts();
</script>

</body>
</html>

  <img src="product-image.jpg">
  <h4>Boat Headphones</h4>
  <p>₹999</p>
  
  <a href="AFFILIATE-LINK-HERE" target="_blank">
    <button>Buy Now</button>
  </a>
</div>
