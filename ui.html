<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKY World Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:rgba(255,255,255,0.06);
  --glass:rgba(255,255,255,0.08);
  --accent:#6c5ce7;
  --accent2:#00f2fe;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:linear-gradient(135deg,#0b0f1a,#111827);
  color:white;
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 18px;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.5);
  z-index:1000;
}

.logo{font-weight:700;font-size:20px;}

.search{
  position:relative;
}
.search input{
  padding:10px 35px;
  border-radius:30px;
  border:none;
  outline:none;
  width:240px;
}
.search::before{
  content:"🔍";
  position:absolute;
  left:10px;
  top:8px;
}

/* HERO */
.hero{
  padding:30px 20px;
  text-align:center;
}
.hero h1{
  font-size:34px;
  background:linear-gradient(45deg,#6c5ce7,#00f2fe);
  -webkit-background-clip:text;
  color:transparent;
}
.hero p{opacity:0.6;margin-top:8px;}

/* CATEGORY */
.categories{
  display:flex;
  overflow-x:auto;
  padding:10px;
}
.categories button{
  margin-right:10px;
  padding:8px 14px;
  border-radius:20px;
  border:none;
  background:var(--glass);
  color:white;
  cursor:pointer;
}
.categories button:hover{
  background:var(--accent);
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:12px;
  position:relative;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  padding:3px 8px;
  font-size:12px;
  border-radius:8px;
}

.wishlist{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}

.price{
  color:#00f2fe;
  font-weight:600;
}

.rating{
  color:gold;
  font-size:14px;
}

/* BUTTON */
.btn{
  margin-top:8px;
  padding:8px;
  width:100%;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#6c5ce7,#00f2fe);
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
}
.modal-content{
  background:#111;
  margin:50px;
  padding:20px;
  border-radius:15px;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:rgba(0,0,0,0.8);
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="loader" id="loader">Loading Premium UI...</div>

<div class="navbar">
<div class="logo">🛒 JKY</div>
<div class="search">
<input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">
</div>
</div>

<div class="hero">
<h1>Next-Gen Shopping</h1>
<p>Experience luxury shopping UI</p>
</div>

<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('electronics')">Electronics</button>
<button onclick="filter('fashion')">Fashion</button>
</div>

<div class="products" id="products"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<div class="bottom-nav">
<div>🏠</div>
<div>🔥</div>
<div>❤️</div>
<div>🛒</div>
</div>

<script>
let data=[
{name:"Smartphone",price:9999,cat:"electronics",rating:4.5,img:"https://via.placeholder.com/200"},
{name:"Shoes",price:1499,cat:"fashion",rating:4.2,img:"https://via.placeholder.com/200"},
{name:"Headphones",price:1999,cat:"electronics",rating:4.8,img:"https://via.placeholder.com/200"}
];

function render(list){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<div class="badge">HOT</div>
<div class="wishlist">❤️</div>
<img src="${p.img}" onclick="detail(${i})">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>
<p class="rating">⭐ ${p.rating}</p>
<button class="btn">Buy Now</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function searchProduct(){
let val=document.getElementById("search").value.toLowerCase();
render(data.filter(p=>p.name.toLowerCase().includes(val)));
}

function filter(cat){
if(cat=="all") render(data);
else render(data.filter(p=>p.cat==cat));
}

function detail(i){
let p=data[i];
document.getElementById("modal").style.display="block";
document.getElementById("modalContent").innerHTML=`
<h2>${p.name}</h2>
<img src="${p.img}" width="100%">
<p>₹${p.price}</p>
<p>⭐ ${p.rating}</p>
<button class="btn">Buy Now</button>
`;
}

window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
render(data);
},1000);
}
</script>

</body>
</html>
